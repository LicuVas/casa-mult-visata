        fields:
          - {label: "Intravilan", name: "intravilan", widget: "boolean", default: false, required: false}
          - {label: "Extravilan", name: "extravilan", widget: "boolean", default: false, required: false}
          - {label: "Deschidere stradală", name: "deschidereStradala", widget: "boolean", default: false, required: false}
          - {label: "Împrejmuit", name: "imprejmuit", widget: "boolean", default: false, required: false}
          - {label: "Utilități la limită", name: "utilitatiLaLimita", widget: "boolean", default: false, required: false}
          - {label: "Iluminat stradal", name: "iluminatStradal", widget: "boolean", default: false, required: false}
          - {label: "Stradă asfaltată", name: "stradaAsfaltata", widget: "boolean", default: false, required: false}
          - {label: "Stradă pietruită", name: "stradaPietruita", widget: "boolean", default: false, required: false}

      - {label: "Exclusivitate?", name: "exclusive", widget: "boolean", default: false, required: false}
      - {label: "Comision 0%?", name: "comisionZero", widget: "boolean", default: true, required: false}

      # CICLU DE VIAȚĂ — folosit pentru filtrare/afișare
      - {label: "Status anunț", name: "listingStatus", widget: "select", options: ["Activ", "Rezervat", "Vândut", "Închiriat", "Retras"], default: "Activ", hint: "Activ = vizibil normal. Rezervat / Vândut / Închiriat = rămâne pe site cu o bandă diagonală pe poză (ex: VÂNDUT). Retras = ascuns din listare. Pune 'Vândut' pe proprietățile vândute ca să apară banda."}
      - label: "Actualizat la"
        name: "updatedAt"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "Data ultimei modificări semnificative. Apare ca 'Actualizat la ...' pe pagina anunțului."

      # LOCAȚIE PE HARTĂ — opțional, dacă vrei marker exact (altfel se folosește centroid de cartier)
      - label: "Locație pe hartă"
        name: "coords"
        widget: "map"
        required: false
        type: "Point"
        decimals: 6
        # Centrul camerei pentru intrări noi (lng, lat) — Piatra Neamț centru
        center: [26.371, 46.929]
        zoom: 13
        default: '{"type":"Point","coordinates":[26.371,46.929]}'
        hint: "Trage markerul roșu pe locația exactă a proprietății. Implicit: centrul Piatra Neamț."

      # MEDIA EXTRA
      - {label: "URL Video (YouTube/Vimeo embed)", name: "videoUrl", widget: "string", required: false, hint: "Ex: https://www.youtube.com/embed/..."}
      - {label: "URL Tur Virtual (Matterport/360)", name: "virtualTourUrl", widget: "string", required: false}
      - {label: "Plan / Schiță (imagine)", name: "floorPlan", widget: "image", required: false}

      - {label: "Imagine Principală", name: "featuredImage", widget: "image", required: false}
      - {label: "Galerie Foto", name: "gallery", widget: "image", multiple: true, required: false, hint: "Poți selecta mai multe poze deodată (ține Ctrl sau Shift în fereastra de selecție, ori în media library). Trage de poze ca să le reordonezi."}
      
      - {label: "Descriere Completă", name: "body", widget: "markdown"}

      # ─── DETALII TEHNICE RO (opționale, recomandate pentru ranking superior) ───
      - label: "--- DETALII TEHNICE (Romania-specific) ---"
        name: "tech_separator"
        widget: "hidden"
        default: "separator"
        required: false
      - label: "Clasă energetică"
        name: "energyClass"
        widget: "select"
        required: false
        options: ["A", "B", "C", "D", "E", "F", "G", "în curs de obținere"]
        hint: 'Obligatorie legal la vânzare/închiriere (Legea 372/2005). Dacă nu ai certificatul încă, alege "în curs de obținere".'
      - label: "Intabulat"
        name: "intabulat"
        widget: "boolean"
        required: false
        hint: "Bifează dacă proprietatea este înscrisă în Cartea Funciară. Prima întrebare a oricărui cumpărător serios."
      - {label: "Număr Cadastral / CF (opțional)", name: "cadastralNumber", widget: "string", required: false, hint: "Ex: 12345/A/B. Nu apare pe site dacă nu vrei — pune-l doar dacă vrei să-l afișezi public."}
      - label: "Compartimentare"
        name: "compartimentare"
        widget: "select"
        required: false
        options: ["Decomandat", "Semidecomandat", "Nedecomandat", "Circular", "Open-space"]
        hint: "Pentru apartamente. Cel mai folosit filtru pe Storia/Imobiliare."
      - {label: "Etaje bloc (total)", name: "floorsTotal", widget: "number", value_type: "int", required: false, hint: 'Numărul total de etaje al blocului/clădirii. Ex: 6 (dacă „Etaj" este „3/6"). Nu are legătură cu liftul — un bloc de 6 etaje poate avea lift.'}
      - label: "Tip încălzire"
        name: "heatingType"
        widget: "select"
        required: false
        options: ["Centrală proprie pe gaz", "Centrală proprie pe lemne/peleți", "Termoficare", "Centrală de bloc", "Sobă", "Altă sursă"]
      - {label: "Orientare", name: "orientation", widget: "string", required: false, hint: "Ex: Sud, Sud-Est, N-S (dacă ai și N și S). Important pentru lumină naturală."}
      - label: "Parcare"
        name: "parking"
        widget: "select"
        required: false
        options: ["Garaj", "Loc subteran", "Loc suprateran", "Stradă", "Niciun loc"]
      - {label: "Număr balcoane", name: "balconies", widget: "number", value_type: "int", required: false}
      - {label: "Suprafață totală balcoane (mp)", name: "balconySurface", widget: "number", value_type: "int", required: false}
      - label: "Stare proprietate"
        name: "condition"
        widget: "select"
        required: false
        options: ["Nou", "Renovat recent", "Bună stare", "Necesită renovare"]
      - label: 'Suprafață utilă (mp) — separat de construită'
        name: "surfaceUtila"
        widget: "number"
        value_type: "int"
        required: false
        hint: "Suprafața din interior, fără balcoane/ziduri. Diferă de suprafața construită."
      - {label: "Suprafață construită (mp)", name: "surfaceConstruita", widget: "number", value_type: "int", required: false, hint: "Include balcoane și ziduri. Folosită pentru calcul preț/mp."}
      - {label: "Disponibil de la (data)", name: "availableFrom", widget: "datetime", required: false, date_format: "YYYY-MM-DD", time_format: false, hint: "Doar pentru închirieri sau preluare amânată. Lasă gol dacă e disponibil imediat."}
      - label: "Tip clădire"
        name: "buildingType"
        widget: "select"
        required: false
        options: ["Bloc", "Vilă", "Casă", "Ansamblu rezidențial", "Clădire de birouri"]
      - label: "Structură constructivă"
        name: "structureType"
        widget: "select"
        required: false
        options: ["Cărămidă", "BCA", "Panou prefabricat", "Mixt", "Lemn"]
        hint: "Relevant pentru risc seismic (panou prefabricat = risc mai mare în Vrancea)."
      - label: "Clasă confort (apartamente vechi)"
        name: "confortClass"
        widget: "select"
        required: false
        options: ["Confort 1", "Confort 1 sporit", "Confort 2", "Confort 3"]
        hint: "Doar pentru apartamente construite înainte de 1990."

      # CÂMPURI PRIVATE - NU APAR PE SITE
      - label: "--- DATE PRIVATE (Nu apar pe site) ---"
        name: "private_separator"
        widget: "hidden"
        default: "separator"
        required: false
      - {label: "Nume / Contact Proprietar (PRIVAT)", name: "privateOwnerContact", widget: "string", required: false, hint: "Acest câmp NU va fi vizibil pe site. Este doar pentru gestiunea ta."}
      - {label: "Notițe Interne (PRIVAT)", name: "privateNotes", widget: "text", required: false, hint: "Orice detalii confidențiale (adresa exactă, cod interfon, etc). NU apare pe site."}
