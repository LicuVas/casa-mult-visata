backend:
  name: github
  repo: LicuVas/casa-mult-visata
  branch: master

media_folder: "public/images"
public_folder: "/images"

site_url: https://casa-mult-visata.netlify.app
display_url: https://casa-mult-visata.netlify.app

locale: 'ro'

collections:
  - name: "proprietati"
    label: "Proprietăți"
    label_singular: "Proprietate"
    folder: "src/content/proprietati"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Titlu", name: "title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Vânzare", "Închiriere"], default: "Vânzare"}
      - {label: "Tip Proprietate", name: "propertyType", widget: "select", options: ["Apartament", "Casă", "Teren", "Spațiu Comercial"]}
      - {label: "Preț", name: "price", widget: "number", value_type: "int"}
      - {label: "Monedă", name: "currency", widget: "select", options: ["EUR", "RON"], default: "EUR"}
      - {label: "Preț pe unitate (ex. 35 €/mp) - Opțional", name: "pricePerUnit", widget: "string", required: false}
      
      - {label: "Locație (Completă)", name: "location", widget: "string"}
      - label: "Zonă / Cartier / Sat"
        name: "zone"
        widget: "select"
        required: false
        options:
          - "1 Mai"
          - "Bodești de Jos"
          - "Centru"
          - "Ciritei"
          - "Dărmănești"
          - "Doamna"
          - "Dobreni"
          - "Doina"
          - "Dumbrava Roșie"
          - "Gura Văii"
          - "Mărăței"
          - "Nisiporești"
          - "Obor"
          - "Pietricica"
          - "Precista"
          - "Sărata"
          - "Speranța"
          - "Tei"
          - "Văleni"
          - "Vânători"
      - {label: "Stradă", name: "street", widget: "string", required: false, hint: "Numele străzii (ex. Strada Orhei, Aleea Ulmilor). Lasă gol dacă nu se aplică."}
      
      - {label: "Număr Camere", name: "rooms", widget: "number", value_type: "int", required: false}
      - {label: "Număr Băi", name: "bathrooms", widget: "number", value_type: "int", required: false}
      - {label: "Suprafață Utilă/Construită (mp)", name: "surface", widget: "number", value_type: "int", required: false}
      - {label: "Suprafață Teren (mp)", name: "landSurface", widget: "number", value_type: "int", required: false}
      - {label: "Etaj", name: "floor", widget: "string", required: false}
      - {label: "An Construcție", name: "yearBuilt", widget: "number", value_type: "int", required: false}
      
      - {label: "Caracteristici / Facilități (Listă)", name: "features", widget: "list", required: false}
      
      - {label: "Exclusivitate?", name: "exclusive", widget: "boolean", default: false, required: false}
      - {label: "Comision 0%?", name: "comisionZero", widget: "boolean", default: true, required: false}

      # CICLU DE VIAȚĂ — folosit pentru filtrare/afișare
      - {label: "Status anunț", name: "listingStatus", widget: "select", options: ["Activ", "Rezervat", "Vândut", "Retras"], default: "Activ", hint: "Activ = vizibil normal. Rezervat = afișat cu badge. Vândut/Retras = ascuns din listare implicită."}
      - label: "Actualizat la"
        name: "updatedAt"
        widget: "datetime"
        required: false
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "Data ultimei modificări semnificative. Apare ca 'Actualizat la ...' pe pagina anunțului."

      # LOCAȚIE PE HARTĂ — opțional, dacă vrei marker exact (altfel se folosește centroid de cartier)
      - label: "Locație pe hartă"
        name: "coords"
        widget: "map"
        required: false
        type: "Point"
        decimals: 6
        # Default: centrul Piatra Neamț (lng,lat în format GeoJSON)
        default: '{"type":"Point","coordinates":[26.371,46.929]}'
        hint: "Trage markerul roșu pe locația exactă a proprietății. Implicit: centrul Piatra Neamț."

      # MEDIA EXTRA
      - {label: "URL Video (YouTube/Vimeo embed)", name: "videoUrl", widget: "string", required: false, hint: "Ex: https://www.youtube.com/embed/..."}
      - {label: "URL Tur Virtual (Matterport/360)", name: "virtualTourUrl", widget: "string", required: false}
      - {label: "Plan / Schiță (imagine)", name: "floorPlan", widget: "image", required: false}

      - {label: "Imagine Principală", name: "featuredImage", widget: "image", required: false}
      - {label: "Galerie Foto", name: "gallery", widget: "list", field: {label: "Imagine", name: "image", widget: "image"}, required: false}
      
      - {label: "Descriere Completă", name: "body", widget: "markdown"}

      # CÂMPURI PRIVATE - NU APAR PE SITE
      - label: "--- DATE PRIVATE (Nu apar pe site) ---"
        name: "private_separator"
        widget: "hidden"
        default: "separator"
        required: false
      - {label: "Nume / Contact Proprietar (PRIVAT)", name: "privateOwnerContact", widget: "string", required: false, hint: "Acest câmp NU va fi vizibil pe site. Este doar pentru gestiunea ta."}
      - {label: "Notițe Interne (PRIVAT)", name: "privateNotes", widget: "text", required: false, hint: "Orice detalii confidențiale (adresa exactă, cod interfon, etc). NU apare pe site."}
