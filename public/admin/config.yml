      # CARACTERISTICI PE TIP — completează DOAR grupul potrivit tipului proprietății.
      # (Sveltia nu ascunde câmpuri condiționat — de aceea sunt 3 grupuri pliabile separate.)
      - label: "Caracteristici — Apartament / Bloc"
        name: "caracteristiciApartament"
        widget: "object"
        collapsed: true
        required: false
        hint: "Bifează doar pentru apartamente. Bifele apar în secțiunea „Facilități și caracteristici”."
        fields:
          - {label: "Lift / ascensor", name: "lift", widget: "boolean", default: false, required: false, hint: "Bifează dacă blocul are lift — INDEPENDENT de numărul de etaje. Și blocurile de 4–6 etaje pot avea lift. Numărul de etaje se completează separat, mai jos la Etaje bloc (total)."}
          - {label: "Centrală proprie", name: "centralaProprie", widget: "boolean", default: false, required: false}
          - {label: "Aer condiționat", name: "aerConditionat", widget: "boolean", default: false, required: false}
          - {label: "Interfon / videointerfon", name: "interfon", widget: "boolean", default: false, required: false}
          - {label: "Boxă / pivniță", name: "boxa", widget: "boolean", default: false, required: false}
          - {label: "Balcon închis", name: "balconInchis", widget: "boolean", default: false, required: false}
          - {label: "Iluminat stradal", name: "iluminatStradal", widget: "boolean", default: false, required: false}
          - {label: "Stradă asfaltată", name: "stradaAsfaltata", widget: "boolean", default: false, required: false}
          - {label: "Transport în comun aproape", name: "transportInComun", widget: "boolean", default: false, required: false}
      - label: "Caracteristici — Casă"
        name: "caracteristiciCasa"
        widget: "object"
        collapsed: true
        required: false
        hint: "Bifează doar pentru case. Bifele apar în secțiunea „Facilități și caracteristici”."
        fields:
          - {label: "Curte împrejmuită", name: "curteImprejmuita", widget: "boolean", default: false, required: false}
          - {label: "Grădină", name: "gradina", widget: "boolean", default: false, required: false}
          - {label: "Garaj", name: "garaj", widget: "boolean", default: false, required: false}
