backend:
  name: github
  repo: LicuVas/casa-mult-visata
  branch: master

media_folder: "public/images"
public_folder: "/images"

# Optimizare automată a pozelor ÎN BROWSER, înainte de commit (Sveltia native).
# Fiecare poză de telefon (3-8 MB) → WebP, max 2048px → ~200-400 KB.
# Astfel commit-ul rămâne sub limita GitHub, oricâte poze adaugă clientul.
media_libraries:
  default:
    config:
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 2048
          height: 2048

site_url: https://casamultvisata.ro
display_url: https://casamultvisata.ro

locale: 'ro'

collections:
  - name: "proprietati"
    label: "Proprietăți"
    label_singular: "Proprietate"
    folder: "src/content/proprietati"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - {label: "Titlu", name: "title", widget: "string"}
      - {label: "Status", name: "status", widget: "select", options: ["Vânzare", "Închiriere"], default: "Vânzare"}
      - {label: "Tip Proprietate", name: "propertyType", widget: "select", options: ["Apartament", "Casă", "Teren", "Spațiu Comercial"]}
      - {label: "Preț", name: "price", widget: "number", value_type: "int"}
      - {label: "Monedă", name: "currency", widget: "select", options: ["EUR", "RON"], default: "EUR"}
      - {label: "Preț pe unitate (ex. 35 €/mp) - Opțional", name: "pricePerUnit", widget: "string", required: false}
      
      - {label: "Locație (Completă)", name: "location", widget: "string"}
      # LOCALITATE STRUCTURATĂ (jud. Neamț → Localitate → Sat/Cartier).
      # Valoarea încapsulează ierarhia: ex. „Neamț › Bicaz › Izvorul Muntelui".
      # Opțional + aditiv: anunțurile vechi rămân pe „Zonă/Sat" de mai jos.
      # Recomandat să folosești ACEST câmp la anunțuri noi. Adăugarea de localități = editezi lista de aici.
      - label: "Localitate (Județ › Localitate › Sat/Cartier)"
        name: "localitate"
        widget: "select"
        required: false
        hint: "Scrie pentru a filtra (ex. \"tur\" → Turturești). Conține toate satele din județul Neamț (sursă SIRUTA). Dacă totuși lipsește ceva, scrie în Locație (Completă) și anunță-mă."
        options:
          - "Neamț › Piatra-Neamț › 1 Mai"
