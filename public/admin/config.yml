          - {label: "Puț forat", name: "putForat", widget: "boolean", default: false, required: false}
          - {label: "Panouri solare", name: "panouriSolare", widget: "boolean", default: false, required: false}
          - {label: "Utilități la stradă (apă/curent/gaz/canalizare)", name: "utilitatiLaStrada", widget: "boolean", default: false, required: false}
