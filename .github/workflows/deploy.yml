name: Build and Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-netlify
  # false = build-urile se pun la coadă și se termină pe rând (nu se anulează unul pe altul).
  # Clientul salvează des din CMS → cu `true`, salvările rapide anulau build-urile în lanț
  # și anunțurile/pozele noi nu mai ajungeau live. Coada garantează că ultima stare se publică.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit so IndexNow can diff changed listings

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -d dist || (echo "::error::dist/ missing"; exit 1)
          test -d dist/images || (echo "::error::dist/images missing - would wipe Netlify CDN"; exit 1)
          test -d dist/admin || (echo "::error::dist/admin missing"; exit 1)
          echo "dist OK ($(ls dist | wc -l) entries, $(ls dist/images | wc -l) images)"

      - name: Check secret presence
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN secret is missing or empty"
            exit 1
          fi
          echo "Token present, length: ${#NETLIFY_AUTH_TOKEN}"

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 661dcad7-eac6-4f24-9249-4536939163e3
        run: |
          npx netlify-cli@17 deploy \
            --prod \
            --dir=dist \
            --site=661dcad7-eac6-4f24-9249-4536939163e3 \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --message="GitHub Action: $GITHUB_SHA"

      - name: Notify IndexNow (Bing/Yandex -> minutes, also feeds ChatGPT Search)
        run: node scripts/indexnow.mjs
        continue-on-error: true   # a Bing hiccup must never fail the client's publish
